services:

    weathersrv_db:
        ports:
        - 27017:27017

    weathersrv:
        ports:
            - "${WEATHER_SRV_PORT}:${WEATHER_SRV_PORT}"

        environment:
            GATEKEEPER_URL:
        volumes:
            - ./mocked_openmeteo.py:/weather-service/src/external_services/openmeteo.py:ro